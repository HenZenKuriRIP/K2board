# =============================================================================
# K2Board — standalone user portal (shadow domain)
#
# Static SPA only. Does NOT host API / admin / DB / Redis / subscribe.
# Browser calls the panel API on www (CORS allow-list + config.js).
#
# Placeholders (install-user-portal.sh replaces these):
#   __SERVER_NAME__   e.g. user.example.com
#   __ROOT__          e.g. /var/www/k2board-user
#   __SSL_CERT__      e.g. /etc/nginx/ssl/fullchain.pem
#   __SSL_KEY__       e.g. /etc/nginx/ssl/privkey.pem
#
# Manual install:
#   1. Deploy web_user dist to __ROOT__
#   2. Set config.js: window.__K2_API_BASE__ = 'https://www.panel.com';
#   3. sed placeholders → /etc/nginx/sites-available/k2board-user
#   4. ln -sf … sites-enabled && nginx -t && systemctl reload nginx
#   5. Admin → Settings → 允许的用户端域名: https://__SERVER_NAME__
#
# Security:
#   - No /api reverse-proxy on this host (preferred)
#   - Firewall: 443 (+22 for ops); prefer Cloudflare IP allowlist
#   - Full (strict) SSL when orange-cloud proxied
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    # ACME / redirect
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __SERVER_NAME__;

    ssl_certificate     __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root __ROOT__;
    index index.html;

    client_max_body_size 4m;
    server_tokens off;
    autoindex off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hide dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Runtime API base — no long cache (ops may rotate www host carefully)
    location = /config.js {
        try_files $uri =404;
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Hashed assets
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /favicon.ico {
        try_files $uri =204;
        access_log off;
        log_not_found off;
    }

    # Root static files (login background, runtime API config)
    location ~* ^/(background\.(png|jpe?g|webp)|config\.js|config\.example\.js|robots\.txt)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA (hash router). try_files serves real files first (e.g. /background.png).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Explicitly refuse common API/admin probes on this host
    location ^~ /api/ {
        default_type text/plain;
        return 404 "user portal only — API is on the panel host\n";
    }

    access_log /var/log/nginx/k2board-user.access.log;
    error_log  /var/log/nginx/k2board-user.error.log;
}
