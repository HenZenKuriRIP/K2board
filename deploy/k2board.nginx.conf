# K2Board Nginx 反向代理配置
# 安装: cp deploy/k2board.nginx.conf /etc/nginx/sites-available/k2board
#       ln -s /etc/nginx/sites-available/k2board /etc/nginx/sites-enabled/
#       nginx -t && systemctl reload nginx
#
# 安全说明: 管理后台通过随机路径隐藏 (如 /44f67dd0/)。
# 修改随机路径: 全局替换 /44f67dd0 为你的密钥即可，nginx -s reload 即时生效。
#
# 用户端部署: 构建 web_user 后放到 /var/www/k2board-user/
#   cd web_user && npm run build && cp -r dist/* /var/www/k2board-user/

# 共用 upstream
upstream k2board_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;  # 替换为你的域名

    client_max_body_size 10m;

    # SSL 证书
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── API（必须在通配规则之前，保证一定打到 Go）───
    location /api/ {
        proxy_pass http://k2board_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── 管理后台 ───
    location /44f67dd0/ {
        rewrite ^/44f67dd0/(.*)$ /$1 break;
        proxy_pass http://k2board_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
    location = /44f67dd0 {
        return 302 /44f67dd0/;
    }

    # ─── 客户端安装包 + 教程配图（独立目录，不随用户端 dist 更新清空）───
    # 服务器目录: /var/www/k2board-downloads/
    # 访问示例: https://域名/downloads/FlClash-xxx.exe
    #           https://域名/downloads/docs-img/flclash-ui.jpeg
    location /downloads/ {
        alias /var/www/k2board-downloads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        sendfile on;
        # 大文件传输
        client_max_body_size 100m;
    }

    # ─── 静态资源（先查用户端，没有再走管理端）───
    location /assets/ {
        root /var/www/k2board-user;
        try_files $uri @go;
        access_log off;
        expires 7d;
    }
    location /favicon.ico {
        root /var/www/k2board-user;
        try_files $uri @go;
        access_log off;
    }

    # 登录背景图 / config.js — 必须在 catch-all 302 之前，否则会跳到登录页
    location ~* ^/(background\.(png|jpe?g|webp)|config\.js|config\.example\.js|robots\.txt)$ {
        root /var/www/k2board-user;
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── 用户端 ───
    location = / {
        root /var/www/k2board-user;
        try_files /index.html =404;
    }
    location / {
        return 302 /;
    }

    # ─── Go 后端兜底（管理端内嵌 assets）───
    location @go {
        proxy_pass http://k2board_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
