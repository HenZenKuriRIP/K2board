# 旧机 A — 仅用户前端 + downloads + /api 反代到管理机 B
# 域名: www.example.com
# 证书: 通配 Origin (*.example.com + example.com)
#
# 安装:
#   1. 把 BACKEND 改成 B 的地址（见下方 upstream）
#   2. cp 到 /etc/nginx/sites-available/k2board
#   3. nginx -t && systemctl reload nginx
#   4. systemctl stop k2board && systemctl disable k2board

# ── 二选一 ──────────────────────────────────────────
# 推荐：B 内网 IP 或仅对 A 放行的 8080
upstream k2board_api {
    server 改成B的IP:8080;
    keepalive 32;
}
# 若走 HTTPS 到 admin 域名，不要用这个 upstream，改用文件底部注释里的 location
# ────────────────────────────────────────────────────

server {
    listen 80;
    server_name www.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.example.com;

    client_max_body_size 100m;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API → 新机 B（用户/订阅/节点/支付回调全部走这里）──
    location /api/ {
        proxy_pass http://k2board_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── 客户端安装包（独立目录）──
    location /downloads/ {
        alias /var/www/k2board-downloads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        sendfile on;
    }

    # ── 用户端静态 ──
    # 必须在 catch-all 302 之前：否则 /background.png 会被重定向到登录页
    location /assets/ {
        root /var/www/k2board-user;
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location = /favicon.ico {
        root /var/www/k2board-user;
        try_files $uri =204;
        access_log off;
    }
    # 登录背景图 / runtime config 等根目录静态文件
    location ~* ^/(background\.(png|jpe?g|webp)|config\.js|config\.example\.js|robots\.txt)$ {
        root /var/www/k2board-user;
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }
    location = / {
        root /var/www/k2board-user;
        try_files /index.html =404;
    }

    # 其它未知路径回首页（hash SPA）
    location / {
        return 302 /;
    }
}

