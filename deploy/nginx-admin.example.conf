# 新机 B — 管理端 + 本机 Go API
# 域名: admin.example.com
# 证书: 与 www 相同的通配 Origin
#
# 安装前:
#   1. 全局替换 ADMIN_PATH_PLACEHOLDER 为 /opt/k2board/.admin_path 内容（无斜杠）
#   2. 确认 k2board 监听 127.0.0.1:8080
#   3. cp 到 /etc/nginx/sites-available/k2board-admin && ln -s ... && nginx -t && reload

upstream k2board_local {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name admin.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.example.com;
    client_max_body_size 10m;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API（管理端前端同源 + 可选被 www 反代）
    location /api/ {
        proxy_pass http://k2board_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 管理后台隐藏路径（与旧站 .admin_path 保持一致）
    location /ADMIN_PATH_PLACEHOLDER/ {
        rewrite ^/ADMIN_PATH_PLACEHOLDER/(.*)$ /$1 break;
        proxy_pass http://k2board_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
    location = /ADMIN_PATH_PLACEHOLDER {
        return 302 /ADMIN_PATH_PLACEHOLDER/;
    }

    # admin 子域根路径也可进管理端（Go 内嵌前端）
    location / {
        proxy_pass http://k2board_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}
