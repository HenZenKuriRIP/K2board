<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preload" as="image" href="/background.png" type="image/png" />
  <title>东京热云 · 用户中心</title>
  <!-- Optional runtime API base for shadow domains (see public/config.example.js) -->
  <script src="/config.js"></script>
  <script>
    // Prevent theme flash before Vue boots (default light)
    (function () {
      try {
        var t = localStorage.getItem('k2_user_theme');
        if (t !== 'light' && t !== 'dark') t = 'light';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.classList.toggle('dark', t === 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
